<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammbaum-Quiz (15 Namen): Russische Nachnamen</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            font-size: 1.8rem;
        }

        .instruction {
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            line-height: 1.5;
            border-left: 5px solid var(--secondary-color);
        }

        .quiz-card {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .surname-display {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 15px;
            display: block;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-btn {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
        }

        .option-btn:hover {
            border-color: var(--secondary-color);
            background-color: #f0f8ff;
        }

        /* Feedback-Farben */
        .quiz-card.is-correct { border-color: var(--success-color); background-color: #f0fff4; }
        .quiz-card.is-incorrect { border-color: var(--error-color); background-color: #fff5f5; }

        .option-btn.correct-choice {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        .option-btn.incorrect-choice {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color) !important;
        }

        .card-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 0.85em;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; }
        .btn-solve { background-color: var(--secondary-color); }
        .btn:hover { opacity: 0.9; }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            .card-controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Stammbaum-Quiz: 15 Nachnamen</h1>

    <div class="instruction">
        <strong>Grammatik-Tipp:</strong> Russische Nachnamen auf <strong>-ов, -ев, -ёв</strong> sind Possessivadjektive. Sie zeigen an, von wem die Familie abstammt.
        <br><br><strong>Aufgabe:</strong> Welcher Vorname oder Beruf ist der Ursprung des Nachnamens? Klicken Sie auf die richtige Antwort.
    </div>

    <div id="quiz-list"></div>
</div>

<script>
    const questions = [
        { id: 1, surname: "Иванов", options: ["Игорь", "Иван", "Илья"], correct: "Иван" },
        { id: 2, surname: "Петров", options: ["Павел", "Пётр", "Потап"], correct: "Пётр" },
        { id: 3, surname: "Николаев", options: ["Никита", "Николай", "Нильс"], correct: "Николай" },
        { id: 4, surname: "Андреев", options: ["Андрей", "Антон", "Алексей"], correct: "Андрей" },
        { id: 5, surname: "Кузнецов", options: ["Купец (Händler)", "Кузнец (Schmied)", "Кухня"], correct: "Кузнец (Schmied)" },
        { id: 6, surname: "Васильев", options: ["Виктор", "Василий", "Валентин"], correct: "Василий" },
        { id: 7, surname: "Гончаров", options: ["Город", "Гончар (Töpfer)", "Гора"], correct: "Гончар (Töpfer)" },
        { id: 8, surname: "Михайлов", options: ["Михаил", "Максим", "Мирон"], correct: "Михаил" },
        { id: 9, surname: "Попов", options: ["Повар (Koch)", "Портной (Schneider)", "Поп (Priester)"], correct: "Поп (Priester)" },
        { id: 10, surname: "Сергеев", options: ["Степан", "Сергей", "Семён"], correct: "Сергей" },
        { id: 11, surname: "Павлов", options: ["Павел", "Пётр", "Павлин"], correct: "Павел" },
        { id: 12, surname: "Алексеев", options: ["Александр", "Алексей", "Андрей"], correct: "Алексей" },
        { id: 13, surname: "Борисов", options: ["Борис", "Богдан", "Боров"], correct: "Борис" },
        { id: 14, surname: "Семёнов", options: ["Сергей", "Семён", "Степан"], correct: "Семён" },
        { id: 15, surname: "Соловьёв", options: ["Соловей (Nachtigall)", "Солнце", "Слово"], correct: "Соловей (Nachtigall)" }
    ];

    function renderQuiz() {
        const list = document.getElementById('quiz-list');
        list.innerHTML = '';

        questions.forEach(q => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.id = `card-${q.id}`;
            card.innerHTML = `
                <span class="surname-display">Nachname: ${q.surname}</span>
                <div class="options-grid">
                    ${q.options.map(opt => `
                        <button class="option-btn" onclick="checkAnswer(${q.id}, '${opt}', this)">${opt}</button>
                    `).join('')}
                </div>
                <div class="card-controls">
                    <button class="btn btn-reset" onclick="resetTask(${q.id})">Zurücksetzen</button>
                    <button class="btn btn-solve" onclick="solveTask(${q.id})">Lösung anzeigen</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    window.checkAnswer = function(id, selected, btn) {
        const card = document.getElementById(`card-${id}`);
        const q = questions.find(item => item.id === id);
        const buttons = card.querySelectorAll('.option-btn');

        // Reset previous feedback on buttons
        buttons.forEach(b => b.className = 'option-btn');

        if (selected === q.correct) {
            card.className = 'quiz-card is-correct';
            btn.classList.add('correct-choice');
        } else {
            card.className = 'quiz-card is-incorrect';
            btn.classList.add('incorrect-choice');
        }
    };

    window.resetTask = function(id) {
        const card = document.getElementById(`card-${id}`);
        card.className = 'quiz-card';
        card.querySelectorAll('.option-btn').forEach(b => b.className = 'option-btn');
    };

    window.solveTask = function(id) {
        const card = document.getElementById(`card-${id}`);
        const q = questions.find(item => item.id === id);
        const buttons = card.querySelectorAll('.option-btn');

        buttons.forEach(b => {
            b.className = 'option-btn';
            if (b.innerText === q.correct) {
                b.classList.add('correct-choice');
            }
        });
        card.className = 'quiz-card is-correct';
    };

    // Quiz initialisieren
    renderQuiz();
</script>

</body>
</html>
